    <style>

            --bg: #f1f5f9;
            --card-bg: #ffffff;

        }

        body {
            margin: 0;
            padding: 20px;

            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .tabs {

            background: #e2e8f0;
            padding: 4px;
            border-radius: 14px;
            margin-bottom: 25px;
            width: 100%;
            max-width: 450px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 10px;
            color: var(--text-light);
            font-weight: bold;
            transition: 0.3s ease;
        }

        .tab.active {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(244, 63, 94, 0.3);
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            position: relative;
            min-height: 460px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 15px;
        }

        .category-tag {
            background: #fff1f2;
            color: #e11d48;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 700;
        }

        .bookmark-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 32px;
            color: #e2e8f0;
            transition: transform 0.2s;
        }

        .bookmark-btn.active {
            color: var(--primary);
        }

        .id-label {
            color: #cbd5e1;
            font-size: 20px;
            font-weight: 800;
        }

        .section-label {
            color: #94a3b8;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .content-box {
            flex-grow: 1;
        }

        .scenario-text {
            font-size: 17px;
            color: var(--text-dark);
            font-style: italic;
            border-left: 5px solid #fecdd3;
            padding-left: 18px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .original-text {
            font-size: 20px;
            color: #64748b;
            margin-bottom: 25px;
        }

        .advanced-text {
            font-size: 26px;
            color: #e11d48;
            font-weight: 800;
            line-height: 1.3;
        }

        .page-counter {
            text-align: right;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: bold;
            margin-top: 20px;
        }

        .nav-grid {
            width: 100%;
            max-width: 600px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .nav-btn {
            background: white;
            border: none;
            padding: 16px;
            border-radius: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.04);
            cursor: pointer;
            color: #475569;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover { background: #fff1f2; color: var(--primary); }
        .nav-btn:active { transform: translateY(2px); }

        @media (max-width: 500px) {
            .card { padding: 20px; min-height: 500px; }
            .advanced-text { font-size: 22px; }

</head>

            {"id": 153, "category": "隨時告知", "scenario": "溫和地請對方在有空時隨時更新近況，不給予壓力。", "original": "Update me.", "advanced": "Whenever you have a moment, let me know how everything goes."},
            {"id": 154, "category": "震驚共鳴", "scenario": "對震撼的消息表達難以置信，並認同那一定是個極其緊繃的時刻。", "original": "Oh wow.", "advanced": "I can't believe that happened; it must have been an intense moment."},
            {"id": 155, "category": "信任鞏固", "scenario": "再次強調對方的信任對你意義重大，對這份坦誠表示感激。", "original": "Thanks for telling me.", "advanced": "I really appreciate you telling me that; it means a lot that you trust me."},
            {"id": 156, "category": "抽離思考", "scenario": "建議對方先暫時抽離當下的細節，從大局觀點出發去釐清思路。", "original": "Think about the whole thing.", "advanced": "Maybe take a step back and look at the bigger picture; it can help things feel clearer."},

            {"id": 158, "category": "成長轉化", "scenario": "將改變帶來的不適定義為成長的契機，肯定對方的內在力量。", "original": "Change is good.", "advanced": "Change can be uncomfortable, but it often leads to growth; you're stronger than you realize."},
            {"id": 159, "category": "潛力激發", "scenario": "提醒對方不要低估自己，因為他所具備的能力遠超乎自我想像。", "original": "Don't doubt yourself.", "advanced": "Don't underestimate yourself; you're capable of much more than you think."},
            {"id": 160, "category": "舒適圈突破", "scenario": "慶祝對方跨出舒適圈，並肯定這是通往成長的唯一道路。", "original": "Good for you.", "advanced": "That's wonderful! You're stepping out of your comfort zone, and that's how growth happens."},
            {"id": 161, "category": "對話終結", "scenario": "溫暖地結束對話，並告知對方你永遠都在這裡，隨時準備聆聽。", "original": "I am here if you need to talk.", "advanced": "If you ever want to talk again, you know where to find me; i'm always here to listen."}
        ];

        let currentMode = 'regular';
        let currentIndex = 0;
        let bookmarks = JSON.parse(localStorage.getItem('user_favs_161') || '[]');

        function getActiveList() {
            return currentMode === 'regular' ? rawData : rawData.filter(item => bookmarks.includes(item.id));
        }

        function updateUI() {
            const list = getActiveList();
            const container = document.getElementById('app-container');
            document.getElementById('fav-count').textContent = `(${bookmarks.length})`;

            if (list.length === 0) {
                container.innerHTML = `
                    <div class="card" style="justify-content:center; align-items:center; text-align:center;">
                        <i class="far fa-heart" style="font-size: 50px; color: #e2e8f0; margin-bottom: 20px;"></i>
                        <p style="color:#94a3b8; font-size: 18px;">目前收藏清單是空的喔 ❤️<br><small>點擊愛心即可收藏常用句子</small></p>
                    </div>
                `;
                return;
            }

            if (currentIndex >= list.length) currentIndex = list.length - 1;
            const item = list[currentIndex];
            const isFav = bookmarks.includes(item.id);

            container.innerHTML = `
                <div class="card">
                    <div class="card-header">
                        <span class="category-tag">${item.category}</span>
                        <button class="bookmark-btn ${isFav ? 'active' : ''}" onclick="handleBookmark(${item.id})">
                            <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                        </button>
                        <span class="id-label">#${item.id}</span>
                    </div>
                    
                    <div class="content-box">
                        <div class="section-label">情境 Scenario</div>
                        <p class="scenario-text">${item.scenario}</p>
                        
                        <div class="section-label">原始表達 Original</div>
                        <p class="original-text">${item.original}</p>
                        
                        <div class="section-label" style="color:var(--primary)">進階用法 Advanced</div>
                        <p class="advanced-text">${item.advanced}</p>
                    </div>
                    
                    <div class="page-counter">
                        ${currentIndex + 1} / ${list.length}
                    </div>
                </div>
            `;
        }

        function switchMode(mode) {
            currentMode = mode;
            currentIndex = 0;
            document.getElementById('tab-regular').classList.toggle('active', mode === 'regular');
            document.getElementById('tab-bookmark').classList.toggle('active', mode === 'bookmark');
            updateUI();
        }

        function goTo(pos) {
            const list = getActiveList();
            if (list.length === 0) return;
            if (pos === 'first') currentIndex = 0;
            else if (pos === 'last') currentIndex = list.length - 1;
            else if (pos === 'next') currentIndex = (currentIndex + 1) % list.length;
            else if (pos === 'prev') currentIndex = (currentIndex - 1 + list.length) % list.length;
            updateUI();
        }

        function handleBookmark(id) {
            if (bookmarks.includes(id)) {
                bookmarks = bookmarks.filter(b => b !== id);
                if (currentMode === 'bookmark' && currentIndex >= getActiveList().length - 1) {
                    currentIndex = Math.max(0, currentIndex - 1);
                }
            } else {
                bookmarks.push(id);
            }
            localStorage.setItem('user_favs_161', JSON.stringify(bookmarks));
            updateUI();
        }

        updateUI();
    </script>
